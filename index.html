<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox 501 - Sportlink</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100vh; width: 100vw;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata" poster="https://webiptv.updatesbyrahul.site/weiptv.webp"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);
      ui.configure({
        controlPanelElements: [
          'play_pause',
          'time_and_duration',
          'mute',
          'volume',
          'spacer',
          'quality',
          'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(63,187,1,1)',
          level: 'rgb(255,69,0)'
        },
        seekBarColors: {
          base: 'rgb(41,41,163)',
          buffered: 'rgb(35,99,3)',
          played: 'rgba(63,187,1,1)'
        }
      });

      // === UPDATED: 4 ClearKey DRM keys ===
      const drmConfig = {
        clearKeys: {"dd06ecf8f97a4526ba6a4b55e00f931a":"2b8648806e203a44adc5fb1326770c17","3335649259ea47f7a5053d8bdf57cd34":"597c2f698102cb103cdd56723a4695a2"
   
        }
      };

      // URL
      const streamUrl =
        "http://foxteldashlive01.akamaized.net/live/channel091/channel091_mcs.isml/playlist_high.mpd?cm=yes&hdnts=exp=1775763306~hmac=074a780b3f1f956b9e043622f3ab3c993fe2e62d59da5df9f71356225b7b9239";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 20,
          rebufferingGoal: 5,
          bufferBehind: 25,
          retryParameters: {
            timeout: 8000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 7000,
          segmentPrefetchLimit: 3,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: {
            timeout: 8000,
            maxAttempts: 3
          }
        }
      });

      // === Autoplay handling ===
      const attemptAutoplay = async () => {
        try {
          video.muted = false;
          await video.play();
          console.log("Unmuted autoplay successful");
        } catch (e1) {
          console.warn("Unmuted autoplay failed:", e1.message);
          try {
            video.muted = true;
            await video.play();
            console.log("Muted autoplay successful");
          } catch (e2) {
            console.warn("Muted autoplay failed:", e2.message);
          }
        }
      };
      try {
        await player.load(streamUrl);
        console.log("Foxtel stream loaded via proxy!");
        if (video.readyState >= 3) attemptAutoplay();
        else video.addEventListener('canplay', attemptAutoplay, { once: true });
      } catch (err) {
        console.error("Stream load error:", err);
      }

      // Auto fullscreen on mobile
      video.addEventListener(
        "play",
        () => {
          if (window.innerWidth <= 768 && !document.fullscreenElement) {
            container.requestFullscreen().catch(() => {});
          }
        },
        { once: true }
      );

      // Enable sound after interaction
      let interacted = false;
      const enableSound = () => {
        if (!interacted && video.muted) {
          video.muted = false;
          interacted = true;
          console.log("Sound enabled after click");
        }
      };
      ["click", "touchstart", "keydown"].forEach((e) =>
        document.addEventListener(e, enableSound, { once: true })
      );

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && video.paused) attemptAutoplay();
      });
    });
  </script>

  <!-- Anti-debugging -->
  <script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>
  <script>
    DisableDevtool({
      disable: true,
      disableMenu: true,
      clearLog: true,
      disableSelect: true,
      disableCopy: true,
      disableCut: true,
      disablePaste: true,
      interval: 10,
      disableMobile: true,
      ondevtoolopen: function () {
        window.location.href = "about:blank";
      },
    });
  </script>
</body>
</html>
